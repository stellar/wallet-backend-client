# GraphQL Schema for Wallet Backend
# Updated schema with full pagination support

# Custom scalars
scalar Time
scalar UInt32
scalar Int64

# GraphQL Query root type - defines all available queries in the API
type Query {
    transactionByHash(hash: String!): Transaction
    transactions(first: Int, after: String, last: Int, before: String): TransactionConnection
    account(address: String!): Account
    operations(first: Int, after: String, last: Int, before: String): OperationConnection
    stateChanges(limit: Int): [StateChange!]!
}

# GraphQL Mutation root type - defines all available mutations in the API
type Mutation {
    # Account management mutations
    registerAccount(input: RegisterAccountInput!): RegisterAccountPayload!
    deregisterAccount(input: DeregisterAccountInput!): DeregisterAccountPayload!
    
    # Transaction mutations
    buildTransaction(input: BuildTransactionInput!): BuildTransactionPayload!
}

# Pagination types for cursor-based pagination
type TransactionConnection {
    edges: [TransactionEdge!]
    pageInfo: PageInfo!
}

type TransactionEdge {
    node: Transaction
    cursor: String!
}

type OperationConnection {
    edges: [OperationEdge!]
    pageInfo: PageInfo!
}

type OperationEdge {
    node: Operation
    cursor: String!
}

type StateChangeConnection {
    edges: [StateChangeEdge!]
    pageInfo: PageInfo!
}

type StateChangeEdge {
    node: StateChange
    cursor: String!
}

type PageInfo {
    startCursor: String
    endCursor: String
    hasNextPage: Boolean!
    hasPreviousPage: Boolean!
}

# GraphQL Transaction type - represents a blockchain transaction
type Transaction {
    hash: String!
    envelopeXdr: String!
    resultXdr: String!
    metaXdr: String!
    ledgerNumber: UInt32!
    ledgerCreatedAt: Time!
    ingestedAt: Time!
    
    # GraphQL Relationships - these fields require resolvers
    operations: [Operation!]!
    accounts: [Account!]!
    stateChanges: [StateChange!]!
}

# GraphQL Operation type - represents a blockchain operation
type Operation {
    id: Int64!
    operationType: OperationType!
    operationXdr: String!
    ledgerNumber: UInt32!
    ledgerCreatedAt: Time!
    ingestedAt: Time!
    
    # GraphQL Relationships - these fields use resolvers  
    transaction: Transaction!
    accounts: [Account!]!
    stateChanges: [StateChange!]!
}

# GraphQL Account type - represents a blockchain account
type Account {
    address: String!

    # GraphQL Relationships with pagination support
    transactions(first: Int, after: String, last: Int, before: String): TransactionConnection
    operations(first: Int, after: String, last: Int, before: String): OperationConnection
    stateChanges(first: Int, after: String, last: Int, before: String): StateChangeConnection
}

# GraphQL StateChange type - represents changes to blockchain state
type StateChange {
    accountId: String!
    stateChangeCategory: StateChangeCategory!
    stateChangeReason: StateChangeReason
    ingestedAt: Time!
    ledgerCreatedAt: Time!
    ledgerNumber: UInt32!
    
    # GraphQL Nullable fields
    tokenId: String
    amount: String
    claimableBalanceId: String
    liquidityPoolId: String
    offerId: String
    signerAccountId: String
    spenderAccountId: String
    sponsoredAccountId: String
    sponsorAccountId: String
    
    # GraphQL fields for JSONB data
    signerWeights: String
    thresholds: String
    flags: [String!]!
    keyValue: String
    
    # GraphQL Relationships
    operation: Operation
    transaction: Transaction!
}

# Input types for account mutations
input RegisterAccountInput {
    address: String!
}

input DeregisterAccountInput {
    address: String!
}

# Input types for transaction mutations
input BuildTransactionInput {
    transaction: TransactionInput!
}

input TransactionInput {
    operations: [String!]!
    timeout: Int!
    simulationResult: SimulationResultInput
}

input SimulationResultInput {
    transactionData: String
    events: [String!]
    minResourceFee: String
    results: [String!]
    latestLedger: Int
    error: String
}

# Payload types for account mutations
type RegisterAccountPayload {
    success: Boolean!
    account: Account
}

type DeregisterAccountPayload {
    success: Boolean!
    message: String
}

# Payload types for transaction mutations
type BuildTransactionPayload {
    success: Boolean!
    transactionXdr: String!
}

# Enums
enum OperationType {
    CREATE_ACCOUNT
    PAYMENT
    PATH_PAYMENT_STRICT_RECEIVE
    PATH_PAYMENT_STRICT_SEND
    MANAGE_SELL_OFFER
    CREATE_PASSIVE_SELL_OFFER
    MANAGE_BUY_OFFER
    SET_OPTIONS
    CHANGE_TRUST
    ALLOW_TRUST
    ACCOUNT_MERGE
    INFLATION
    MANAGE_DATA
    BUMP_SEQUENCE
    CREATE_CLAIMABLE_BALANCE
    CLAIM_CLAIMABLE_BALANCE
    BEGIN_SPONSORING_FUTURE_RESERVES
    END_SPONSORING_FUTURE_RESERVES
    REVOKE_SPONSORSHIP
    CLAWBACK
    CLAWBACK_CLAIMABLE_BALANCE
    SET_TRUST_LINE_FLAGS
    LIQUIDITY_POOL_DEPOSIT
    LIQUIDITY_POOL_WITHDRAW
    INVOKE_HOST_FUNCTION
    EXTEND_FOOTPRINT_TTL
    RESTORE_FOOTPRINT
}

enum StateChangeCategory {
    DEBIT
    CREDIT
    MINT
    BURN
    SIGNER
    SIGNATURE_THRESHOLD
    METADATA
    FLAGS
    LIABILITY
    TRUSTLINE_FLAGS
    ALLOWANCE
    SPONSORSHIP
    CONTRACT
    AUTHORIZATION
    UNSUPPORTED
}

enum StateChangeReason {
    ADD
    REMOVE
    UPDATE
    LOW
    MEDIUM
    HIGH
    HOME_DOMAIN
    SET
    CLEAR
    SELL
    BUY
    DATA_ENTRY
    CONSUME
    DEPLOY
    INVOKE
}