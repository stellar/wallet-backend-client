name: test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run codegen
      run: npm run codegen
      
    - name: Build project
      run: npm run build
      
    - name: Run unit tests
      run: npm test -- --testPathIgnorePatterns=integration.test.ts
      
    - name: Run unit tests with coverage
      run: npm run test:coverage -- --testPathIgnorePatterns=integration.test.ts
      
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false 